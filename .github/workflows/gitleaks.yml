name: gitleaks

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan git history
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.30.1
        with:
          args: git --redact --verbose --no-banner .
